{{- if .Values.minio.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-create-bucket
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-create-bucket
    spec:
      restartPolicy: OnFailure
      containers:
      - name: create-bucket
        image: docker.io/minio/mc:latest
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-minio
              key: root-user
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-minio
              key: root-password
        command:
        - /bin/sh
        - -c
        - |
          mc alias set myminio http://{{ .Release.Name }}-minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
          mc mb myminio/argo-artifacts --ignore-existing
          mc anonymous set download myminio/argo-artifacts || true
      serviceAccountName: {{ .Release.Name }}-minio
{{- end }}
