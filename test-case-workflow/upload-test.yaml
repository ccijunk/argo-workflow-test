apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: artifact-upload-
spec:
  entrypoint: main
  templates:
  - name: main
    container:
      image: alpine:latest
      command: [sh, -c]
      args:
        - |
          echo "Hello from Argo Workflows" > /tmp/output.txt
          echo "Test artifact content" > /tmp/test.txt
          cat /tmp/output.txt
          cat /tmp/test.txt
      name: main
    outputs:
      artifacts:
      - name: output
        path: /tmp/output.txt
        archive:
          none: {}
        s3:
          bucket: argo-artifacts
          key: test/{{ workflow.name }}/output.txt
      - name: test
        path: /tmp/test.txt
        archive:
          none: {}
        s3:
          bucket: argo-artifacts
          key: test/{{ workflow.name }}/test.txt
